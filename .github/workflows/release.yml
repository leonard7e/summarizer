name: Release Build

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Create Documentation PDF
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        shell: bash
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      
      - name: Generate User Manual
        uses: docker://asciidoctor/docker-asciidoctor
        with:
          args: asciidoctor-pdf -a icons=font doc/user_manual.adoc -o doc/summarizer-${{ env.VERSION }}-user-manual.pdf

      - name: Generate Development Manual
        uses: docker://asciidoctor/docker-asciidoctor
        with:
          args: asciidoctor-pdf -a icons=font doc/development_manual.adoc -o doc/summarizer-${{ env.VERSION }}-development-manual.pdf

      - uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: |
            doc/summarizer-${{ env.VERSION }}-user-manual.pdf
            doc/summarizer-${{ env.VERSION }}-development-manual.pdf

  # Build Binaries only
  dist:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            bin: summarizer
            triplet: x86_64-linux
          - os: windows-latest
            bin: summarizer.exe
            triplet: x86_64-windows
          - os: macos-latest
            bin: summarizer
            triplet: x86_64-macos

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Environment
        shell: bash
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)
          echo "DIR=summarizer-$VERSION-${{ matrix.triplet }}" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release

      - name: Package Binary
        shell: bash
        run: |
          mkdir -p ${{ env.DIR }}
          cp target/release/${{ matrix.bin }} ${{ env.DIR }}/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DIR }}
          path: ${{ env.DIR }}/

  # Publish to GitHub Release
  publish:
    needs: [docs, dist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Assets
        run: |
          mkdir -p release-assets
          # Copy PDFs
          cp artifacts/documentation/*.pdf release-assets/
          # Zip binaries
          for dir in artifacts/summarizer-*; do
            if [ -d "$dir" ]; then
              base=$(basename "$dir")
              (cd "$dir" && zip -r "../../release-assets/$base.zip" .)
            fi
          done
          ls -R release-assets/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}