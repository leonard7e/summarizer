name: Release Build

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  # Create Documentation PDF
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        shell: bash
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)
          echo "DOC_NAME=summarizer-$VERSION-manual" >> $GITHUB_ENV
          echo "FILE_NAME=summarizer-$VERSION-manual.pdf" >> $GITHUB_ENV
      
      - name: Generate PDF
        uses: docker://asciidoctor/docker-asciidoctor
        with:
          args: asciidoctor-pdf -a icons=font doc/summarizer.adoc -o doc/${{ env.FILE_NAME }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DOC_NAME }}
          path: doc/${{ env.FILE_NAME }}

  # Build Binaries only
  dist:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            bin: summarizer
            triplet: x86_64-linux
          - os: windows-latest
            bin: summarizer.exe
            triplet: x86_64-windows
          - os: macos-latest
            bin: summarizer
            triplet: x86_64-macos

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Environment
        shell: bash
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)
          echo "DIR=summarizer-$VERSION-${{ matrix.triplet }}" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release

      - name: Package Binary
        shell: bash
        run: |
          mkdir -p ${{ env.DIR }}/bin
          cp target/release/${{ matrix.bin }} ${{ env.DIR }}/bin/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DIR }}
          path: ${{ env.DIR }}/